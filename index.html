<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramming's Cave</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Ramming's Cave</h1>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="diagram">Veri Analizi</button>
        <button class="tab-btn" data-tab="aimodel">YZ Modeli</button>
        <button class="tab-btn" data-tab="stats">İstatistik</button>
        <button class="tab-btn" data-tab="resources">Kaynaklar</button>
      </nav>
    </header>

    <main>
      <!-- TAB 1: ER Diagram -->
      <section id="tab-diagram" class="tab-content active">
        <div class="diagram-layout">
          <div class="diagram-area">
            <svg id="diagram-svg" viewBox="0 0 800 520" preserveAspectRatio="xMidYMid meet"></svg>
          </div>
          <div class="detail-panel" id="detail-panel">
            <div class="detail-placeholder">
              <span class="arrow-hint">←</span>
              <p>Bir aşamaya tıklayın</p>
            </div>
            <div class="detail-content" id="detail-content" style="display:none"></div>
          </div>
        </div>
      </section>

      <!-- TAB 2: AI Model Design -->
      <section id="tab-aimodel" class="tab-content">
        <div class="diagram-layout">
          <div class="diagram-area">
            <svg id="ai-svg" viewBox="0 0 880 780" preserveAspectRatio="xMidYMid meet"></svg>
          </div>
          <div class="detail-panel" id="ai-detail-panel">
            <div class="detail-placeholder" id="ai-placeholder">
              <span class="arrow-hint">←</span>
              <p>Bir aşamaya tıklayın</p>
            </div>
            <div class="detail-content" id="ai-detail-content" style="display:none"></div>
          </div>
        </div>
      </section>

      <!-- TAB 3: Statistics -->
      <section id="tab-stats" class="tab-content">
        <div class="stats-container" id="stats-container"></div>
      </section>

      <!-- TAB 4: Notlar -->
      <section id="tab-resources" class="tab-content">
        <div class="notes-layout">

          <!-- Sol: form + token -->
          <div class="notes-sidebar">
            <div class="token-bar" id="token-bar">
              <span class="token-status" id="token-status">⚪ Bağlantı kurulmadı</span>
              <button class="btn-ghost" id="token-btn">Token Ayarla</button>
            </div>

            <div class="note-form" id="note-form">
              <h3 class="form-title" id="form-title">+ Yeni Not</h3>
              <input id="note-title"   class="note-input" type="text"     placeholder="Başlık" />
              <input id="note-tags"    class="note-input" type="text"     placeholder="Etiketler  (#ml #python)" />
              <textarea id="note-body" class="note-textarea"              placeholder="Notunu buraya yaz..."></textarea>
              <div class="form-actions">
                <button class="btn-save"   id="btn-save">Kaydet</button>
                <button class="btn-cancel" id="btn-cancel" style="display:none">Vazgeç</button>
              </div>
              <p class="form-hint" id="form-hint"></p>
            </div>
          </div>

          <!-- Sağ: not listesi -->
          <div class="notes-main">
            <div class="notes-header">
              <span class="notes-count" id="notes-count"></span>
              <input class="notes-search" id="notes-search" type="text" placeholder="🔍  Notlarda ara..." />
            </div>
            <div class="notes-list" id="notes-list">
              <div class="notes-empty" id="notes-empty" style="display:none">
                <p>Henüz not yok. İlk notunu ekle →</p>
              </div>
            </div>
          </div>

        </div>

        <!-- Token modal -->
        <div class="modal-overlay" id="modal-overlay" style="display:none">
          <div class="modal-box">
            <h3>GitHub Token Ayarı</h3>
            <p>Notlar <code>0x3m1r/0x3m1r.github.io</code> reposundaki <code>notes.json</code> dosyasında tutulur.<br>
               Okuma/yazma için <strong>Contents</strong> yetkili bir GitHub Personal Access Token gir.</p>
            <input class="note-input" id="modal-token" type="password" placeholder="ghp_xxxxxxxxxxxx" />
            <div class="form-actions">
              <button class="btn-save" id="modal-save">Kaydet</button>
              <button class="btn-cancel" id="modal-cancel">İptal</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
